<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ WCup 2026 — Knockout Pool</title>
<style>
  :root {
    --bg: #0a0e1a; --card: #121929; --card2: #1a2540;
    --accent: #00d4aa; --accent2: #f59e0b; --accent3: #ef4444;
    --text: #e2e8f0; --muted: #64748b; --border: #1e2d4a;
    --green: #22c55e; --red: #ef4444; --yellow: #f59e0b; --blue: #3b82f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

  /* Header */
  .header { background: linear-gradient(135deg, #0f1e3d 0%, #1a3a6e 100%); padding: 16px 24px; border-bottom: 2px solid var(--accent); display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 1.4rem; font-weight: 700; color: #fff; }
  .header .subtitle { font-size: 0.8rem; color: var(--accent); margin-top: 2px; }
  .badge { background: var(--accent); color: #000; font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; }

  /* Tab nav */
  .tab-nav { display: flex; overflow-x: auto; background: var(--card); border-bottom: 1px solid var(--border); padding: 0 8px; gap: 2px; flex-shrink: 0; }
  .tab-btn { padding: 12px 16px; font-size: 0.82rem; font-weight: 600; color: var(--muted); border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; transition: all .2s; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn.round-tab { color: #94a3b8; }
  .tab-btn.round-tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }
  .tab-btn.player-tab.active { color: #a78bfa; border-bottom-color: #a78bfa; }

  /* Tab content */
  .tab-content { display: none; padding: 20px 16px; max-width: 1200px; margin: 0 auto; }
  .tab-content.active { display: block; }

  /* Cards */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .card-title { font-size: 0.85rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px; }

  /* Leaderboard */
  .lb-table { width: 100%; border-collapse: collapse; }
  .lb-table th { text-align: left; padding: 8px 12px; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
  .lb-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
  .lb-table tr:last-child td { border-bottom: none; }
  .lb-table tr:hover td { background: var(--card2); }
  .rank-1 td:first-child { color: var(--yellow); font-weight: 700; font-size: 1rem; }
  .rank-2 td:first-child { color: #94a3b8; font-weight: 700; }
  .rank-3 td:first-child { color: #cd7f32; font-weight: 700; }
  .pts-big { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
  .champion-pill { display: inline-block; background: var(--card2); border: 1px solid var(--border); border-radius: 20px; padding: 2px 10px; font-size: 0.75rem; color: var(--accent2); }

  /* Match cards */
  .match-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }
  .match-card { background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; position: relative; }
  .match-card.has-result { border-color: var(--border); }
  .match-num { font-size: 0.7rem; color: var(--muted); margin-bottom: 6px; }
  .match-teams { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .team-name { font-size: 0.9rem; font-weight: 600; flex: 1; }
  .team-name.winner { color: var(--green); }
  .team-name.loser { color: var(--muted); text-decoration: line-through; }
  .vs-badge { font-size: 0.7rem; color: var(--muted); background: var(--card); padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
  .result-badge { position: absolute; top: 10px; right: 10px; font-size: 0.65rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
  .result-badge.final { background: #166534; color: #86efac; }
  .result-badge.live { background: #7c2d12; color: #fdba74; animation: pulse 1.5s infinite; }
  .result-badge.pending { background: var(--card); color: var(--muted); border: 1px solid var(--border); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
  .upset-tag { display: inline-block; background: #7c3aed; color: #ddd6fe; font-size: 0.65rem; font-weight: 700; padding: 1px 6px; border-radius: 4px; margin-left: 6px; }

  /* Pick stats bar */
  .pick-bar { margin-top: 8px; }
  .pick-bar-label { font-size: 0.72rem; color: var(--muted); display: flex; justify-content: space-between; margin-bottom: 4px; }
  .pick-bar-track { height: 6px; background: var(--card); border-radius: 3px; overflow: hidden; }
  .pick-bar-fill { height: 100%; background: var(--blue); border-radius: 3px; transition: width .5s; }
  .pick-names { font-size: 0.7rem; color: var(--muted); margin-top: 4px; }

  /* Player detail */
  .player-picks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
  .pick-row { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--card2); border-radius: 8px; border-left: 3px solid var(--border); font-size: 0.84rem; }
  .pick-row.correct { border-left-color: var(--green); }
  .pick-row.wrong { border-left-color: var(--red); }
  .pick-row.pending { border-left-color: var(--muted); }
  .pick-icon { font-size: 1rem; flex-shrink: 0; }
  .pick-match { color: var(--muted); font-size: 0.72rem; }
  .pick-pts { margin-left: auto; font-weight: 700; font-size: 0.85rem; }
  .pick-pts.pos { color: var(--green); }

  /* Summary cards */
  .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; }
  .stat-val { font-size: 1.6rem; font-weight: 700; color: var(--accent); }
  .stat-lbl { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

  /* Section sep */
  .section-label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin: 20px 0 8px; font-weight: 700; }

  /* Round tabs inside player */
  .inner-tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .inner-tab { padding: 6px 14px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); color: var(--muted); background: none; transition: all .2s; }
  .inner-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* Pending round placeholder */
  .pending-round { text-align: center; padding: 40px; color: var(--muted); }
  .pending-round .big { font-size: 3rem; margin-bottom: 12px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Responsive */
  @media (max-width: 600px) {
    .stat-row { grid-template-columns: repeat(2, 1fr); }
    .match-grid { grid-template-columns: 1fr; }
    .header h1 { font-size: 1.1rem; }
    .tab-btn { padding: 10px 12px; font-size: 0.78rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>⚽ WCup 2026 — Knockout Pool</h1>
    <div class="subtitle">FIFA World Cup 2026 · Prediction Pool · 15 Players</div>
  </div>
  <span class="badge" id="currentRoundBadge">R32 Live</span>
</div>

<div class="tab-nav" id="mainTabNav"></div>
<div id="mainTabContent"></div>

<script>
// ============================================================
// ⚙️  DATA CONFIGURATION — แก้ไขตรงนี้
// ============================================================

const FIFA_RANKS = {
  'Argentina': 1, 'Spain': 2, 'France': 3, 'England': 4, 'Portugal': 5,
  'Brazil': 6, 'Morocco': 7, 'Netherlands': 8, 'Belgium': 9, 'Germany': 10,
  'Croatia': 11, 'Colombia': 13, 'Mexico': 14, 'Senegal': 15, 'Uruguay': 16,
  'USA': 17, 'Japan': 18, 'Switzerland': 19, 'Iran': 20, 'Türkiye': 22,
  'Ecuador': 23, 'Austria': 24, 'South Korea': 25, 'Australia': 27,
  'Algeria': 28, 'Egypt': 29, 'Canada': 30, 'Norway': 31, 'Ivory Coast': 33,
  'Panama': 34, 'Sweden': 38, 'Czechia': 40, 'Paraguay': 41, 'Scotland': 42,
  'Tunisia': 45, 'DR Congo': 46, 'Uzbekistan': 50, 'Qatar': 56, 'Iraq': 57,
  'South Africa': 60, 'Saudi Arabia': 61, 'Jordan': 63,
  'Bosnia and Herzegovina': 64, 'Cape Verde': 67, 'Ghana': 73, 'Curaçao': 82
};

// คะแนนต่อรอบ
const ROUND_POINTS = {
  R32:   { base: 2,  upset: 3  },
  R16:   { base: 5,  upset: 5  },
  QF:    { base: 10, upset: 10 },
  SF:    { base: 20, upset: 15 },
  '3rd': { base: 5,  upset: 5  },
  Final: { base: 30, upset: 20 }
};

const CHAMPION_BONUS = { R32: 50, R16: 30, QF: 15, SF: 5 };

// ============================================================
// 🏟️  MATCHES — 16 คู่ R32
// ============================================================
const R32_MATCHES = [
  { id:'m1',  num:1,  date:'29 มิ.ย. 02:00',  teamA:'South Africa', teamB:'Canada'                   },
  { id:'m2',  num:2,  date:'30 มิ.ย. 00:00',  teamA:'Brazil',       teamB:'Japan'                    },
  { id:'m3',  num:3,  date:'30 มิ.ย. 03:30',  teamA:'Germany',      teamB:'Paraguay'                 },
  { id:'m4',  num:4,  date:'30 มิ.ย. 08:00',  teamA:'Netherlands',  teamB:'Morocco'                  },
  { id:'m5',  num:5,  date:'1 ก.ค. 00:00',    teamA:'Ivory Coast',  teamB:'Norway'                   },
  { id:'m6',  num:6,  date:'1 ก.ค. 04:00',    teamA:'France',       teamB:'Sweden'                   },
  { id:'m7',  num:7,  date:'1 ก.ค. 08:00',    teamA:'Mexico',       teamB:'Ecuador'                  },
  { id:'m8',  num:8,  date:'1 ก.ค. 23:00',    teamA:'England',      teamB:'DR Congo'                 },
  { id:'m9',  num:9,  date:'2 ก.ค. 03:00',    teamA:'Belgium',      teamB:'Senegal'                  },
  { id:'m10', num:10, date:'2 ก.ค. 07:00',    teamA:'USA',          teamB:'Bosnia and Herzegovina'   },
  { id:'m11', num:11, date:'3 ก.ค. 02:00',    teamA:'Spain',        teamB:'Austria'                  },
  { id:'m12', num:12, date:'3 ก.ค. 06:00',    teamA:'Portugal',     teamB:'Croatia'                  },
  { id:'m13', num:13, date:'3 ก.ค. 10:00',    teamA:'Switzerland',  teamB:'Algeria'                  },
  { id:'m14', num:14, date:'4 ก.ค. 01:00',    teamA:'Australia',    teamB:'Egypt'                    },
  { id:'m15', num:15, date:'4 ก.ค. 05:00',    teamA:'Argentina',    teamB:'Cape Verde'               },
  { id:'m16', num:16, date:'4 ก.ค. 08:30',    teamA:'Colombia',     teamB:'Ghana'                    }
];

// ============================================================
// 🏆  RESULTS — อัปเดตตรงนี้เมื่อทราบผล
// null = ยังไม่แข่ง / 'TeamName' = ทีมที่ชนะ
// ============================================================
const RESULTS = {
  R32: {
    m1:  'Canada',      // ✅ 29 มิ.ย. — แก้ไขถ้าผลต่างออก
    m2:  null,
    m3:  null,
    m4:  null,
    m5:  null,
    m6:  null,
    m7:  null,
    m8:  null,
    m9:  null,
    m10: null,
    m11: null,
    m12: null,
    m13: null,
    m14: null,
    m15: null,
    m16: null
  },
  R16:   {},
  QF:    {},
  SF:    {},
  Final: {}
};

// ============================================================
// 👥  PLAYERS — ดึงจาก Google Form Response
// ============================================================
const PLAYERS = [
  { name: 'รัฐพงศ์ 1',
    R32: ['Canada','Brazil','Germany','Netherlands','Ivory Coast','France','Ecuador','England','Senegal','USA','Spain','Portugal','Algeria','Egypt','Argentina','Colombia'],
    champion: 'Argentina', championRound: 'R32' },
  { name: 'รัฐพงศ์ 2',
    R32: ['Canada','Brazil','Germany','Netherlands','Ivory Coast','France','Ecuador','England','Senegal','USA','Spain','Portugal','Algeria','Egypt','Argentina','Colombia'],
    champion: 'Germany', championRound: 'R32' },
  { name: 'KY1',
    R32: ['Canada','Brazil','Germany','Netherlands','Ivory Coast','France','Mexico','England','Belgium','USA','Spain','Portugal','Switzerland','Egypt','Argentina','Colombia'],
    champion: 'Argentina', championRound: 'R32' },
  { name: 'KY2',
    R32: ['Canada','Japan','Germany','Morocco','Norway','France','Mexico','England','Belgium','USA','Spain','Portugal','Switzerland','Australia','Argentina','Colombia'],
    champion: 'France', championRound: 'R32' },
  { name: 'SUN1',
    R32: ['Canada','Japan','Germany','Netherlands','Ivory Coast','France','Mexico','England','Belgium','USA','Spain','Portugal','Switzerland','Egypt','Argentina','Colombia'],
    champion: 'Argentina', championRound: 'R32' },
  { name: 'SUN2',
    R32: ['Canada','Brazil','Germany','Netherlands','Ivory Coast','France','Mexico','England','Belgium','USA','Spain','Portugal','Switzerland','Egypt','Argentina','Colombia'],
    champion: null, championRound: null },
  { name: 'Mod winning 1',
    R32: ['Canada','Brazil','Germany','Netherlands','Norway','France','Mexico','England','Belgium','USA','Spain','Portugal','Switzerland','Australia','Argentina','Colombia'],
    champion: 'Spain', championRound: 'R32' },
  { name: 'Mod winning 2',
    R32: ['Canada','Brazil','Germany','Netherlands','Norway','France','Mexico','England','Belgium','USA','Spain','Portugal','Switzerland','Australia','Argentina','Colombia'],
    champion: 'France', championRound: 'R32' },
  { name: 'Direk',
    R32: ['Canada','Brazil','Germany','Netherlands','Norway','France','Mexico','England','Senegal','USA','Spain','Portugal','Switzerland','Egypt','Argentina','Colombia'],
    champion: 'France', championRound: 'R32' },
  { name: 'Arsom3',
    R32: ['Canada','Brazil','Germany','Netherlands','Ivory Coast','France','Mexico','England','Belgium','USA','Spain','Portugal','Switzerland','Egypt','Argentina','Colombia'],
    champion: 'Spain', championRound: 'R32' },
  { name: 'เด่น',
    R32: ['Canada','Brazil','Germany','Netherlands','Ivory Coast','France','Mexico','England','Senegal','USA','Spain','Portugal','Switzerland','Australia','Argentina','Colombia'],
    champion: 'Argentina', championRound: 'R32' },
  { name: 'Chaidet01',
    R32: ['Canada','Brazil','Germany','Netherlands','Norway','France','Mexico','England','Belgium','USA','Spain','Portugal','Switzerland','Australia','Argentina','Colombia'],
    champion: 'Argentina', championRound: 'R32' },
  { name: 'Chaidet02',
    R32: ['Canada','Japan','Germany','Netherlands','Ivory Coast','France','Mexico','England','Belgium','USA','Spain','Portugal','Algeria','Egypt','Argentina','Colombia'],
    champion: 'England', championRound: 'R32' },
  { name: 'ภัทราวุธ 1',
    R32: ['South Africa','Brazil','Germany','Netherlands','Norway','France','Mexico','England','Belgium','USA','Spain','Portugal','Algeria','Australia','Argentina','Colombia'],
    champion: 'Spain', championRound: 'R32' },
  { name: 'ภัทราวุธ 2',
    R32: ['South Africa','Brazil','Germany','Netherlands','Norway','France','Mexico','England','Belgium','USA','Spain','Portugal','Switzerland','Australia','Argentina','Colombia'],
    champion: 'France', championRound: 'R32' }
];

// ============================================================
// 🔢  SCORING ENGINE
// ============================================================
function getRank(team) { return FIFA_RANKS[team] || 999; }

function isUpset(winner, loser) {
  return getRank(winner) > getRank(loser); // winner has higher number = weaker team
}

function computePlayerScore(player) {
  let total = 0, breakdown = {};

  // R32 base scoring
  const r32Pts = ROUND_POINTS.R32;
  let r32Correct = 0, r32Upset = 0, r32Total = 0, r32PerfectEligible = true;
  const r32Detail = [];

  R32_MATCHES.forEach((match, i) => {
    const result = RESULTS.R32[match.id];
    const pick = player.R32[i];
    let pts = 0, status = 'pending';

    if (result) {
      if (pick === result) {
        pts = r32Pts.base;
        r32Correct++;
        const loser = result === match.teamA ? match.teamB : match.teamA;
        if (isUpset(result, loser)) {
          pts += r32Pts.upset;
          r32Upset++;
          status = 'correct_upset';
        } else {
          status = 'correct';
        }
      } else {
        status = 'wrong';
        r32PerfectEligible = false;
      }
      r32Total += pts;
    } else {
      r32PerfectEligible = false; // not all results in yet
    }

    r32Detail.push({ match, pick, result, pts, status });
  });

  // Check perfect round (only if all results are in)
  const allResultsIn = R32_MATCHES.every(m => RESULTS.R32[m.id] !== null);
  if (allResultsIn && r32PerfectEligible && r32Correct === 16) {
    r32Total *= 2;
    breakdown.perfectRound = true;
  }

  breakdown.r32 = { pts: r32Total, correct: r32Correct, upset: r32Upset, detail: r32Detail };
  total += r32Total;

  // Champion bonus
  let championPts = 0;
  if (player.champion) {
    const finalWinner = RESULTS.Final && RESULTS.Final.winner;
    if (finalWinner === player.champion) {
      championPts = CHAMPION_BONUS[player.championRound] || 0;
    }
    // bonus stays pending until Final is played
  }
  breakdown.champion = { team: player.champion, round: player.championRound, pts: championPts };
  total += championPts;

  return { total, breakdown };
}

// ============================================================
// 🎨  UI RENDERER
// ============================================================
function extractTeamName(str) {
  if (!str) return null;
  return str.replace(/\s*\(FIFA #\d+\)\s*/g, '').trim();
}

function buildNav() {
  const nav = document.getElementById('mainTabNav');
  const tabs = [
    { id: 'lb',    label: '🏆 Leaderboard', cls: '' },
    { id: 'r32',   label: '⚽ R32',          cls: 'round-tab' },
    { id: 'r16',   label: 'R16',             cls: 'round-tab' },
    { id: 'qf',    label: 'QF',              cls: 'round-tab' },
    { id: 'sf',    label: 'SF',              cls: 'round-tab' },
    { id: 'final', label: '🥇 Final',        cls: 'round-tab' },
    { id: 'sep',   label: '|',               cls: '' }
  ];
  PLAYERS.forEach(p => tabs.push({ id: 'p_'+p.name, label: '👤 '+p.name, cls: 'player-tab' }));

  nav.innerHTML = tabs.map(t =>
    t.id === 'sep'
      ? `<span style="padding:12px 4px;color:var(--border);font-size:1.2rem">|</span>`
      : `<button class="tab-btn ${t.cls}" data-tab="${t.id}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join('');
}

function switchTab(id) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tc_'+id));
}

// --- Leaderboard ---
function buildLeaderboard() {
  const scores = PLAYERS.map(p => {
    const sc = computePlayerScore(p);
    return { name: p.name, champion: p.champion, championRound: p.championRound, ...sc };
  }).sort((a,b) => b.total - a.total);

  let rankNum = 0, prevPts = -1;
  scores.forEach((s,i) => {
    if (s.total !== prevPts) { rankNum = i+1; prevPts = s.total; }
    s.rank = rankNum;
  });

  const champCount = {};
  PLAYERS.forEach(p => { if(p.champion) champCount[p.champion] = (champCount[p.champion]||0)+1; });

  return `
  <div class="card">
    <div class="card-title">🏆 ตารางคะแนนสะสม</div>
    <table class="lb-table">
      <thead><tr>
        <th>#</th><th>ชื่อ</th><th>R32</th><th>R16</th><th>QF</th><th>SF</th><th>Final</th><th>แชมป์โบนัส</th><th>รวม</th><th>ล็อคแชมป์</th>
      </tr></thead>
      <tbody>
        ${scores.map(s => `
        <tr class="rank-${s.rank}" onclick="switchTab('p_${s.name}')" style="cursor:pointer">
          <td>${s.rank === 1 ? '🥇' : s.rank === 2 ? '🥈' : s.rank === 3 ? '🥉' : s.rank}</td>
          <td><strong>${s.name}</strong></td>
          <td>${s.breakdown.r32.pts}</td>
          <td>—</td><td>—</td><td>—</td><td>—</td>
          <td>${s.breakdown.champion.pts > 0 ? '<span style="color:var(--yellow)">+'+s.breakdown.champion.pts+'</span>' : '—'}</td>
          <td class="pts-big">${s.total}</td>
          <td>${s.champion ? `<span class="champion-pill">🏆 ${s.champion}</span>` : '<span style="color:var(--muted);font-size:.75rem">ไม่ได้ล็อค</span>'}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>
  <div class="card">
    <div class="card-title">📊 สถิติการล็อคแชมป์</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px">
      ${Object.entries(champCount).sort((a,b)=>b[1]-a[1]).map(([team,cnt]) => `
        <div style="background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;text-align:center">
          <div style="font-weight:700;font-size:.9rem">${team}</div>
          <div style="color:var(--accent);font-size:1.2rem;font-weight:700">${cnt}</div>
          <div style="color:var(--muted);font-size:.7rem">คน</div>
        </div>
      `).join('')}
    </div>
  </div>`;
}

// --- R32 Round tab ---
function buildR32Tab() {
  const resultsIn = R32_MATCHES.filter(m => RESULTS.R32[m.id]).length;

  const matchCards = R32_MATCHES.map(match => {
    const result = RESULTS.R32[match.id];
    const rankA = getRank(match.teamA), rankB = getRank(match.teamB);
    const favTeam = rankA < rankB ? match.teamA : match.teamB;
    const underdogTeam = rankA < rankB ? match.teamB : match.teamA;
    const upset = result ? isUpset(result, result === match.teamA ? match.teamB : match.teamA) : false;

    // pick distribution
    const picksA = PLAYERS.filter(p => p.R32[match.num-1] === match.teamA).length;
    const picksB = PLAYERS.filter(p => p.R32[match.num-1] === match.teamB).length;
    const total = picksA + picksB;
    const pctA = total ? Math.round(picksA/total*100) : 50;

    const statusLabel = !result ? '<span class="result-badge pending">PENDING</span>' :
      `<span class="result-badge final">FINAL${upset ? ' 🔥' : ''}</span>`;

    const teamAClass = result ? (result===match.teamA ? 'winner':'loser') : '';
    const teamBClass = result ? (result===match.teamB ? 'winner':'loser') : '';

    return `
    <div class="match-card">
      ${statusLabel}
      <div class="match-num">คู่ที่ ${match.num} · ${match.date}</div>
      <div class="match-teams">
        <span class="team-name ${teamAClass}">${match.teamA}<small style="color:var(--muted);font-size:.7rem"> #${rankA}</small>${rankA<rankB?'<span style="color:var(--yellow);font-size:.7rem"> ★</span>':''}</span>
        <span class="vs-badge">VS</span>
        <span class="team-name ${teamBClass}" style="text-align:right">${match.teamB}<small style="color:var(--muted);font-size:.7rem"> #${rankB}</small>${rankB<rankA?'<span style="color:var(--yellow);font-size:.7rem"> ★</span>':''}</span>
      </div>
      ${upset ? `<div style="margin-bottom:6px"><span class="upset-tag">🔥 UPSET +3 Bonus!</span></div>` : ''}
      <div class="pick-bar">
        <div class="pick-bar-label">
          <span>${match.teamA} <strong>${picksA}</strong>คน</span>
          <span><strong>${picksB}</strong>คน ${match.teamB}</span>
        </div>
        <div class="pick-bar-track"><div class="pick-bar-fill" style="width:${pctA}%"></div></div>
      </div>
    </div>`;
  }).join('');

  return `
  <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">
    <div class="stat-card" style="flex:1;min-width:120px"><div class="stat-val">${resultsIn}/16</div><div class="stat-lbl">นัดที่เสร็จแล้ว</div></div>
    <div class="stat-card" style="flex:1;min-width:120px"><div class="stat-val">${16-resultsIn}</div><div class="stat-lbl">นัดที่รอผล</div></div>
    <div class="stat-card" style="flex:1;min-width:120px"><div class="stat-val">${R32_MATCHES.filter(m=>RESULTS.R32[m.id]&&isUpset(RESULTS.R32[m.id],RESULTS.R32[m.id]===m.teamA?m.teamB:m.teamA)).length}</div><div class="stat-lbl">Upsets!</div></div>
  </div>
  <div class="match-grid">${matchCards}</div>`;
}

// --- Pending round placeholder ---
function buildPendingRound(roundName) {
  return `<div class="pending-round">
    <div class="big">⏳</div>
    <div style="font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:8px">${roundName} — ยังไม่เริ่ม</div>
    <div style="font-size:.85rem">ผลจะแสดงเมื่ออัปเดต RESULTS ใน code</div>
  </div>`;
}

// --- Player Detail Tab ---
function buildPlayerTab(player) {
  const sc = computePlayerScore(player);
  const r32 = sc.breakdown.r32;

  const picks = R32_MATCHES.map((match, i) => {
    const result = RESULTS.R32[match.id];
    const pick = player.R32[i];
    const detail = r32.detail[i];
    let icon = '⏳', cls = 'pending', ptsStr = '';
    if (result) {
      if (pick === result) {
        const loser = result === match.teamA ? match.teamB : match.teamA;
        icon = isUpset(result, loser) ? '🔥' : '✅';
        cls = 'correct';
        ptsStr = `+${detail.pts}`;
      } else {
        icon = '❌'; cls = 'wrong'; ptsStr = '0';
      }
    }
    return `
    <div class="pick-row ${cls}">
      <span class="pick-icon">${icon}</span>
      <div>
        <div class="pick-match">คู่ที่ ${match.num}: ${match.teamA} vs ${match.teamB}</div>
        <div style="font-size:.85rem;font-weight:600;margin-top:2px">${pick}</div>
      </div>
      ${ptsStr ? `<div class="pick-pts pos">${ptsStr}</div>` : ''}
    </div>`;
  }).join('');

  const champIcon = !player.champion ? '—' :
    (RESULTS.Final && RESULTS.Final.winner === player.champion) ? '🏆✅ +'+CHAMPION_BONUS[player.championRound] :
    (RESULTS.Final && RESULTS.Final.winner && RESULTS.Final.winner !== player.champion) ? '🏆❌' :
    '🏆⏳';

  return `
  <div class="stat-row">
    <div class="stat-card"><div class="stat-val">${sc.total}</div><div class="stat-lbl">คะแนนรวม</div></div>
    <div class="stat-card"><div class="stat-val">${r32.correct}</div><div class="stat-lbl">ถูก R32</div></div>
    <div class="stat-card"><div class="stat-val">${r32.pts}</div><div class="stat-lbl">แต้ม R32</div></div>
    <div class="stat-card"><div class="stat-val">${player.champion || '—'}</div><div class="stat-lbl">ล็อคแชมป์ ${champIcon}</div></div>
  </div>
  <div class="card">
    <div class="card-title">⚽ คำทาย Round of 32</div>
    <div class="player-picks-grid">${picks}</div>
    ${sc.breakdown.perfectRound ? '<div style="background:#14532d;border:1px solid #16a34a;border-radius:8px;padding:10px;text-align:center;margin-top:12px;font-weight:700;color:#86efac">🎯 PERFECT ROUND! ×2 คะแนน</div>' : ''}
  </div>
  <div class="card">
    <div class="card-title">รอบถัดไป</div>
    <div class="pending-round" style="padding:20px"><div style="color:var(--muted)">ฟอร์ม R16–Final จะเปิดหลัง R32 จบ</div></div>
  </div>`;
}

// ============================================================
// 🚀  INIT
// ============================================================
function init() {
  buildNav();
  const content = document.getElementById('mainTabContent');

  const sections = [
    { id: 'lb',    html: () => buildLeaderboard() },
    { id: 'r32',   html: () => buildR32Tab() },
    { id: 'r16',   html: () => buildPendingRound('Round of 16') },
    { id: 'qf',    html: () => buildPendingRound('Quarterfinals') },
    { id: 'sf',    html: () => buildPendingRound('Semifinals') },
    { id: 'final', html: () => buildPendingRound('Final') }
  ];
  PLAYERS.forEach(p => sections.push({ id: 'p_'+p.name, html: () => buildPlayerTab(p) }));

  content.innerHTML = sections.map(s =>
    `<div class="tab-content" id="tc_${s.id}">${s.html()}</div>`
  ).join('');

  switchTab('lb');

  // Update badge
  const done = R32_MATCHES.filter(m => RESULTS.R32[m.id]).length;
  document.getElementById('currentRoundBadge').textContent = done < 16 ? `R32 · ${done}/16` : 'R32 เสร็จ';
}

init();
</script>
</body>
</html>
